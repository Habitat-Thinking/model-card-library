name: Validate model cards

on:
  pull_request:
    paths:
      - '*/*.md'
      - '.github/workflows/validate-cards.yml'
      - 'scripts/validate_cards.py'
  push:
    branches: [main]
    paths:
      - '*/*.md'
      - '.github/workflows/validate-cards.yml'
      - 'scripts/validate_cards.py'

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install PyYAML
        run: pip install pyyaml==6.0.2

      - name: Validate every card has Jekyll-nav frontmatter
        run: python3 scripts/validate_cards.py
